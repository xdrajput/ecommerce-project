spring.application.name=ecommerce-placement-backend
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
app.jwt.secret=change-this-secret-key-to-at-least-32-characters-long-123456
app.jwt.expiration-minutes=120
app.admin.name=System Admin
app.admin.email=admin@shop.com
app.admin.password=Admin@123
